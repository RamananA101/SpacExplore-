<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpacExplore — Navigate the Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hud: rgba(0, 200, 255, 0.85);
      --hud-dim: rgba(0, 200, 255, 0.35);
      --hud-bg: rgba(0, 10, 30, 0.88);
      --accent: #00c8ff;
      --warn: #ff6b35;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Exo 2', sans-serif;
      color: white;
      cursor: crosshair;
    }

    canvas { display: block; }

    /* ── HUD HEADER ── */
    #hud-header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,5,20,0.9) 0%, transparent 100%);
      z-index: 10; pointer-events: none;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem; font-weight: 900;
      letter-spacing: 0.15em; color: var(--accent);
      text-shadow: 0 0 20px rgba(0,200,255,0.6);
    }
    .logo span { color: white; }
    .hud-coords {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem; color: var(--hud-dim);
      letter-spacing: 0.1em; text-align: right;
    }

    /* ── CONTROLS HINT ── */
    #controls-hint {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 2rem;
      background: rgba(0,10,30,0.7);
      border: 1px solid rgba(0,200,255,0.2);
      padding: 0.6rem 1.5rem; border-radius: 2rem;
      z-index: 10; pointer-events: none;
    }
    .hint {
      font-size: 0.7rem; color: var(--hud-dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .hint b { color: var(--accent); font-weight: 500; }

    /* ── PLANET INFO PANEL ── */
    #info-panel {
      position: fixed; right: 2rem; top: 50%;
      transform: translateY(-50%);
      width: 300px;
      background: var(--hud-bg);
      border: 1px solid rgba(0,200,255,0.3);
      border-left: 3px solid var(--accent);
      padding: 1.8rem;
      z-index: 20;
      display: none;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-50%) translateX(20px); }
      to   { opacity: 1; transform: translateY(-50%) translateX(0); }
    }
    #info-panel.visible { display: block; }

    .panel-close {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: none; border: 1px solid var(--hud-dim);
      color: var(--hud-dim); width: 24px; height: 24px;
      border-radius: 50%; cursor: pointer; font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .panel-close:hover { border-color: var(--warn); color: var(--warn); }

    .panel-type {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--hud-dim);
      margin-bottom: 0.4rem;
    }
    .panel-name {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem; font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 15px rgba(0,200,255,0.4);
      margin-bottom: 1.2rem;
      line-height: 1.1;
    }
    .panel-divider {
      height: 1px; background: rgba(0,200,255,0.2);
      margin: 1rem 0;
    }
    .panel-desc {
      font-size: 0.85rem; line-height: 1.75;
      color: rgba(255,255,255,0.75); font-weight: 300;
      margin-bottom: 1.2rem;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .stat {
      background: rgba(0,200,255,0.06);
      border: 1px solid rgba(0,200,255,0.15);
      padding: 0.6rem 0.8rem; border-radius: 4px;
    }
    .stat-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--hud-dim);
      margin-bottom: 0.2rem;
    }
    .stat-value {
      font-size: 0.85rem; font-weight: 500; color: white;
    }

    /* ── PLANET LIST (left sidebar) ── */
    #planet-list {
      position: fixed; left: 1.5rem; top: 50%;
      transform: translateY(-50%);
      z-index: 10; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .planet-btn {
      background: rgba(0,10,30,0.7);
      border: 1px solid rgba(0,200,255,0.2);
      color: rgba(255,255,255,0.6);
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.5rem 0.8rem;
      cursor: pointer; transition: all 0.2s; text-align: left;
      white-space: nowrap;
    }
    .planet-btn:hover, .planet-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,200,255,0.08);
      text-shadow: 0 0 8px rgba(0,200,255,0.5);
    }
    .planet-btn::before {
      content: '▸ ';
      opacity: 0; transition: opacity 0.2s;
    }
    .planet-btn:hover::before, .planet-btn.active::before { opacity: 1; }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .loading-logo {
      font-family: 'Orbitron', monospace;
      font-size: 2.5rem; font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(0,200,255,0.6);
      letter-spacing: 0.2em; margin-bottom: 0.5rem;
    }
    .loading-sub {
      font-family: 'Exo 2', sans-serif;
      font-size: 0.8rem; color: var(--hud-dim);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .loading-bar-wrap {
      width: 280px; height: 2px;
      background: rgba(0,200,255,0.15);
      border-radius: 2px; overflow: hidden;
    }
    .loading-bar {
      height: 100%; width: 0%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      transition: width 0.05s linear;
    }
    .loading-text {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem; color: var(--hud-dim);
      letter-spacing: 0.15em; margin-top: 1rem;
    }

    /* mobile */
    @media (max-width: 600px) {
      #info-panel { right: 0.5rem; left: 0.5rem; width: auto; top: auto; bottom: 5rem; transform: none; }
      #planet-list { display: none; }
      #controls-hint { gap: 1rem; font-size: 0.6rem; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loading-logo">SpacExplore</div>
  <div class="loading-sub">Navigate the Universe</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="load-bar"></div></div>
  <div class="loading-text" id="load-text">Initialising warp drive…</div>
</div>

<!-- HUD HEADER -->
<div id="hud-header">
  <div class="logo">Spac<span>Explore</span></div>
  <div class="hud-coords" id="coords">
    SECTOR: SOL SYSTEM<br>
    <span id="focus-label">FOCUS: FREE ROAM</span>
  </div>
</div>

<!-- PLANET LIST -->
<div id="planet-list"></div>

<!-- INFO PANEL -->
<div id="info-panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-type" id="p-type"></div>
  <div class="panel-name" id="p-name"></div>
  <div class="panel-desc" id="p-desc"></div>
  <div class="panel-divider"></div>
  <div class="stat-grid" id="p-stats"></div>
</div>

<!-- CONTROLS -->
<div id="controls-hint">
  <div class="hint"><b>Drag</b> to rotate</div>
  <div class="hint"><b>Scroll</b> to zoom</div>
  <div class="hint"><b>Click</b> planet to explore</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

    desc: 'Venus is the hottest planet in the Solar System, with surface temperatures reaching 465°C due to a runaway greenhouse effect. It rotates backwards compared to most planets, meaning the Sun rises in the west on Venus.',
    stats: { 'Diameter': '12,104 km', 'Day Length': '243 Earth days', 'Moons': '0', 'Avg Temp': '465°C' }
  },
  {
    id: 'earth', name: 'Earth', type: 'Terrestrial Planet',
    radius: 1, distance: 23, orbitSpeed: 0.029, selfRotation: 0.01,

    ring: false,
    desc: 'Earth is the only known planet to harbour life. It has liquid water on its surface, a protective magnetic field, and an atmosphere rich in nitrogen and oxygen. It is the densest planet in the Solar System.',
    stats: { 'Diameter': '12,742 km', 'Day Length': '24 hours', 'Moons': '1', 'Avg Temp': '15°C' }
  },
  {
    id: 'mars', name: 'Mars', type: 'Terrestrial Planet',
    radius: 0.7, distance: 31, orbitSpeed: 0.024, selfRotation: 0.009,
    color: 0xc1440e, emissive: 0x3a0a00, emissiveIntensity: 0.05,
    ring: false,
    desc: 'Mars is the Red Planet — its colour comes from iron oxide (rust) on its surface. It hosts Olympus Mons, the tallest volcano in the Solar System, and Valles Marineris, a canyon system stretching 4,000 km.',
    stats: { 'Diameter': '6,779 km', 'Day Length': '24.6 hours', 'Moons': '2', 'Avg Temp': '-65°C' }
  },
  {
    id: 'jupiter', name: 'Jupiter', type: 'Gas Giant',
    radius: 2.8, distance: 44, orbitSpeed: 0.013, selfRotation: 0.02,

    ring: false,
    desc: 'Jupiter is the largest planet — so big that all other planets could fit inside it. Its Great Red Spot is a storm that has raged for over 350 years. Jupiter acts as a cosmic shield, its gravity deflecting asteroids away from the inner Solar System.',

  {

    desc: 'Uranus is an ice giant that rotates on its side — its axial tilt is 98°, likely caused by a massive ancient collision. It is the coldest planetary atmosphere in the Solar System at -224°C, colder even than Neptune.',
    stats: { 'Diameter': '50,724 km', 'Day Length': '17.2 hours', 'Moons': '28', 'Avg Temp': '-195°C' }
  },
  {

    ring: false,
    desc: 'Neptune is the windiest planet, with storms reaching 2,100 km/h. It was predicted mathematically before it was seen through a telescope. Its largest moon Triton orbits backwards and is slowly spiralling inward — it will eventually be torn apart.',

  },
  {
    id: 'moon', name: 'The Moon', type: 'Natural Satellite',

    ring: false, parentId: 'earth',
    desc: 'Earth\'s Moon is the fifth largest moon in the Solar System. It stabilises Earth\'s axial tilt, moderates our climate, and drives ocean tides. It is the only celestial body beyond Earth where humans have set foot.',
    stats: { 'Diameter': '3,474 km', 'Orbit Period': '27.3 days', 'Distance': '384,400 km', 'Gravity': '1/6 of Earth' }
  },

// ══════════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════════
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 30, 90);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lights
const sunLight = new THREE.PointLight(0xffffff, 2.5, 500);
scene.add(sunLight);
const ambient = new THREE.AmbientLight(0x111133, 0.8);
scene.add(ambient);

// Stars
function createStars() {
  const geo = new THREE.BufferGeometry();
  const count = 8000;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 1800;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.85 });
  scene.add(new THREE.Points(geo, mat));
}
createStars();

// Milky Way band (faint points in a disk)
function createMilkyWay() {
  const geo = new THREE.BufferGeometry();
  const count = 3000;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 400 + Math.random() * 500;
    pos[i*3]   = Math.cos(angle) * r;
    pos[i*3+1] = (Math.random() - 0.5) * 80;
    pos[i*3+2] = Math.sin(angle) * r;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0x8888ff, size: 0.5, transparent: true, opacity: 0.25 });
  scene.add(new THREE.Points(geo, mat));
}
createMilkyWay();

// ── Build planets ──
const meshMap = {};
const orbitAngles = {};
const planetGroup = new THREE.Group();
scene.add(planetGroup);

// Earth group (for moon orbit)
const earthGroup = new THREE.Group();
planetGroup.add(earthGroup);

BODIES.forEach(body => {
  const geo = new THREE.SphereGeometry(body.radius, 64, 64);
  let mat;

  if (body.id === 'sun') {
    mat = new THREE.MeshBasicMaterial({ color: body.color });
  } else if (body.id === 'earth') {
    mat = new THREE.MeshPhongMaterial({
      color: body.color, emissive: body.emissive,
      emissiveIntensity: body.emissiveIntensity,
      shininess: 30,
    });
  } else {
    mat = new THREE.MeshPhongMaterial({
      color: body.color, emissive: body.emissive,
      emissiveIntensity: body.emissiveIntensity, shininess: 10,
    });
  }

  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = body;
  orbitAngles[body.id] = Math.random() * Math.PI * 2;

  if (body.id === 'sun') {
    mesh.position.set(0, 0, 0);
    planetGroup.add(mesh);

    // Sun glow
    const glowGeo = new THREE.SphereGeometry(body.radius * 1.3, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xffaa00, transparent: true, opacity: 0.12, side: THREE.BackSide
    });
    planetGroup.add(new THREE.Mesh(glowGeo, glowMat));

  } else if (body.id === 'moon') {
    mesh.position.set(body.distance - 23, 0, 0); // relative to earth
    earthGroup.add(mesh);
  } else {
    const angle = orbitAngles[body.id];
    mesh.position.set(Math.cos(angle) * body.distance, 0, Math.sin(angle) * body.distance);
    planetGroup.add(mesh);

    if (body.id === 'earth') {
      earthGroup.position.copy(mesh.position);
    }

    // Orbit ring
    const orbitGeo = new THREE.RingGeometry(body.distance - 0.05, body.distance + 0.05, 128);
    const orbitMat = new THREE.MeshBasicMaterial({
      color: 0x334455, transparent: true, opacity: 0.3, side: THREE.DoubleSide
    });
    const orbitMesh = new THREE.Mesh(orbitGeo, orbitMat);
    orbitMesh.rotation.x = Math.PI / 2;
    planetGroup.add(orbitMesh);
  }

  // Saturn rings
  if (body.ring) {
    const ringGeo = new THREE.RingGeometry(body.radius * 1.5, body.radius * 2.6, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xd4c47a, transparent: true, opacity: 0.6, side: THREE.DoubleSide
    });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.rotation.x = Math.PI / 3;
    mesh.add(ringMesh);
  }

  meshMap[body.id] = mesh;
});

// ── Asteroid Belt ──
function createAsteroidBelt() {
  const geo = new THREE.BufferGeometry();
  const count = 1500;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 36 + Math.random() * 5;
    pos[i*3]   = Math.cos(angle) * r;
    pos[i*3+1] = (Math.random() - 0.5) * 1.5;
    pos[i*3+2] = Math.sin(angle) * r;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0x887755, size: 0.18, transparent: true, opacity: 0.7 });
  scene.add(new THREE.Points(geo, mat));
}
createAsteroidBelt();

// ── Raycaster for click ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const clickableMeshes = Object.values(meshMap);

// ══════════════════════════════════════════════
//  CAMERA CONTROLS (orbit)
// ══════════════════════════════════════════════
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 3, radius: 90 };
let targetSpherical = { ...spherical };
let focusTarget = new THREE.Vector3(0, 0, 0);
let targetFocus = new THREE.Vector3(0, 0, 0);
let focusedBody = null;

function updateCamera() {
  const s = spherical;
  camera.position.set(
    focusTarget.x + s.radius * Math.sin(s.phi) * Math.cos(s.theta),
    focusTarget.y + s.radius * Math.cos(s.phi),
    focusTarget.z + s.radius * Math.sin(s.phi) * Math.sin(s.theta)
  );
  camera.lookAt(focusTarget);
}

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('touchstart', e => { isDragging = true; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });

window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  targetSpheri
