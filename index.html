<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpacExplore — Navigate the Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --hud: rgba(0, 200, 255, 0.85);
      --hud-dim: rgba(0, 200, 255, 0.35);
      --hud-bg: rgba(0, 10, 30, 0.88);
      --accent: #00c8ff;
      --warn: #ff6b35;
    }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Exo 2', sans-serif;
      color: white;
      cursor: crosshair;
    }
    canvas { display: block; }

    #hud-header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,5,20,0.9), transparent);
      z-index: 10; pointer-events: none;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: 0.15em; color: var(--accent);
      text-shadow: 0 0 20px rgba(0,200,255,0.6);
    }
    .logo span { color: white; }

    #controls-hint {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 2rem;
      background: rgba(0,10,30,0.7);
      border: 1px solid rgba(0,200,255,0.2);
      padding: 0.6rem 1.5rem; border-radius: 2rem;
      z-index: 10;
    }
    .hint { font-size: 0.75rem; color: var(--hud-dim); letter-spacing: 0.08em; text-transform: uppercase; }
    .hint b { color: var(--accent); }

    #info-panel {
      position: fixed; right: 2rem; top: 50%;
      transform: translateY(-50%);
      width: 340px;
      background: var(--hud-bg);
      border: 1px solid rgba(0,200,255,0.3);
      border-left: 4px solid var(--accent);
      padding: 1.8rem;
      z-index: 20;
      display: none;
      border-radius: 6px;
    }
    #info-panel.visible { display: block; animation: slideIn 0.4s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-50%) translateX(40px); } to { opacity: 1; transform: translateY(-50%) translateX(0); } }

    .panel-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: 1px solid var(--hud-dim);
      color: var(--hud-dim); width: 30px; height: 30px;
      border-radius: 50%; cursor: pointer; font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
    }
    .panel-name { font-family: 'Orbitron', monospace; font-size: 1.8rem; color: var(--accent); margin: 8px 0; }
    .panel-desc { line-height: 1.75; color: rgba(255,255,255,0.85); }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat { background: rgba(0,200,255,0.08); padding: 10px; border-radius: 4px; border: 1px solid rgba(0,200,255,0.2); }

    #planet-list {
      position: fixed; left: 1.5rem; top: 50%;
      transform: translateY(-50%);
      z-index: 10; display: flex; flex-direction: column; gap: 6px;
    }
    .planet-btn {
      background: rgba(0,10,30,0.8);
      border: 1px solid rgba(0,200,255,0.25);
      color: rgba(255,255,255,0.8);
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem; letter-spacing: 0.1em;
      padding: 0.75rem 1.1rem;
      cursor: pointer; transition: all 0.2s;
    }
    .planet-btn:hover, .planet-btn.active {
      background: rgba(0,200,255,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    #loading {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .loading-logo {
      font-family: 'Orbitron', monospace;
      font-size: 3.5rem; font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 50px rgba(0,200,255,0.8);
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div class="loading-logo">SpacExplore</div>
  <div style="margin-top:20px; color:var(--hud-dim); letter-spacing:3px;">EXPLORING THE COSMOS...</div>
</div>

<!-- HUD -->
<div id="hud-header">
  <div class="logo">Spac<span>Explore</span></div>
  <div style="font-family:'Orbitron',monospace; font-size:0.75rem; color:var(--hud-dim); text-align:right;">
    SECTOR: SOL SYSTEM<br>
    <span id="focus-label">FOCUS: FREE ROAM</span>
  </div>
</div>

<!-- Planet List -->
<div id="planet-list"></div>

<!-- Info Panel -->
<div id="info-panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div id="p-type" style="font-size:0.65rem; letter-spacing:2px; color:var(--hud-dim);"></div>
  <div id="p-name" class="panel-name"></div>
  <div id="p-desc" class="panel-desc"></div>
  <div class="panel-divider" style="height:1px;background:rgba(0,200,255,0.25);margin:15px 0;"></div>
  <div id="p-stats" class="stat-grid"></div>
</div>

<!-- Controls Hint -->
<div id="controls-hint">
  <div class="hint"><b>DRAG</b> Rotate</div>
  <div class="hint"><b>SCROLL</b> Zoom</div>
  <div class="hint"><b>CLICK</b> Planet</div>
</div>

<script>
// =============== BODIES DATA ===============
const BODIES = [
  { id: 'sun', name: 'The Sun', type: 'Star', radius: 6, distance: 0, selfRotation: 0.003,
    desc: 'The heart of our Solar System. A massive ball of plasma providing energy for life on Earth.', stats: {'Age':'4.6 Billion years','Surface Temp':'5,500°C'} },
  { id: 'mercury', name: 'Mercury', type: 'Terrestrial', radius: 0.8, distance: 14, selfRotation: 0.004,
    desc: 'Smallest planet with extreme temperature swings.', stats: {'Diameter':'4,879 km','Moons':'0'} },
  { id: 'venus', name: 'Venus', type: 'Terrestrial', radius: 1.2, distance: 22, selfRotation: -0.002,
    desc: 'Hottest planet with a toxic, crushing atmosphere.', stats: {'Diameter':'12,104 km','Moons':'0'} },
  { id: 'earth', name: 'Earth', type: 'Terrestrial', radius: 1.3, distance: 30, selfRotation: 0.02,
    desc: 'Our home. The only known planet with liquid water and life.', stats: {'Diameter':'12,742 km','Moons':'1'} },
  { id: 'mars', name: 'Mars', type: 'Terrestrial', radius: 0.9, distance: 42, selfRotation: 0.018,
    desc: 'The Red Planet. Target for future human colonization.', stats: {'Diameter':'6,779 km','Moons':'2'} },
  { id: 'jupiter', name: 'Jupiter', type: 'Gas Giant', radius: 3.5, distance: 65, selfRotation: 0.04,
    desc: 'Largest planet with the Great Red Spot storm.', stats: {'Diameter':'139,820 km','Moons':'95'} },
  { id: 'saturn', name: 'Saturn', type: 'Gas Giant', radius: 3, distance: 95, selfRotation: 0.038,
    desc: 'Famous for its beautiful and complex ring system.', stats: {'Diameter':'116,460 km','Moons':'146'} },
  { id: 'uranus', name: 'Uranus', type: 'Ice Giant', radius: 2.2, distance: 130, selfRotation: -0.02,
    desc: 'An ice giant that rotates on its side.', stats: {'Diameter':'50,724 km','Moons':'28'} },
  { id: 'neptune', name: 'Neptune', type: 'Ice Giant', radius: 2.1, distance: 160, selfRotation: 0.025,
    desc: 'Windiest planet with supersonic winds.', stats: {'Diameter':'49,244 km','Moons':'16'} }
];

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3000);
camera.position.set(40, 60, 160);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

// Lights
scene.add(new THREE.AmbientLight(0x404060, 0.8));
const sunLight = new THREE.PointLight(0xffffff, 4.5, 2000);
scene.add(sunLight);

// Deep Space
const starsGeo = new THREE.BufferGeometry();
const count = 30000;
const pos = new Float32Array(count * 3);
for (let i = 0; i < count * 3; i++) pos[i] = THREE.MathUtils.randFloatSpread(3000);
starsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.7})));

// Create Planets
const meshes = {};

BODIES.forEach(body => {
  const geo = new THREE.SphereGeometry(body.radius, 64, 64);
  const textureMap = {
    sun: 'https://www.solarsystemscope.com/textures/download/2k_sun.jpg',
    mercury: 'https://www.solarsystemscope.com/textures/download/2k_mercury.jpg',
    venus: 'https://www.solarsystemscope.com/textures/download/2k_venus_surface.jpg',
    earth: 'https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg',
    mars: 'https://www.solarsystemscope.com/textures/download/2k_mars.jpg',
    jupiter: 'https://www.solarsystemscope.com/textures/download/2k_jupiter.jpg',
    saturn: 'https://www.solarsystemscope.com/textures/download/2k_saturn.jpg',
    uranus: 'https://www.solarsystemscope.com/textures/download/2k_uranus.jpg',
    neptune: 'https://www.solarsystemscope.com/textures/download/2k_neptune.jpg'
  };

  const material = new THREE.MeshPhongMaterial({
    map: loader.load(textureMap[body.id]),
    shininess: body.id === 'earth' ? 35 : 12
  });

  const mesh = new THREE.Mesh(geo, material);
  mesh.userData = body;
  meshes[body.id] = mesh;

  if (body.id === 'sun') mesh.position.set(0, 0, 0);
  else mesh.position.x = body.distance;

  scene.add(mesh);

  if (body.id === 'saturn') {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(4.8, 7.5, 64),
      new THREE.MeshBasicMaterial({color: 0xeeeeee, side: THREE.DoubleSide, transparent: true, opacity: 0.85})
    );
    ring.rotation.x = Math.PI / 2;
    mesh.add(ring);
  }
});

// Click Detection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(Object.values(meshes));
  if (intersects.length > 0) {
    showInfoPanel(intersects[0].object.userData);
  }
});

function showInfoPanel(body) {
  document.getElementById('p-type').textContent = body.type.toUpperCase();
  document.getElementById('p-name').textContent = body.name;
  document.getElementById('p-desc').textContent = body.desc;
  
  const container = document.getElementById('p-stats');
  container.innerHTML = '';
  Object.entries(body.stats).forEach(([k, v]) => {
    container.innerHTML += `<div class="stat"><div style="font-size:0.6rem;color:var(--hud-dim)">\( {k}</div><div style="font-weight:500"> \){v}</div></div>`;
  });
  document.getElementById('info-panel').classList.add('visible');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('visible');
}

// Animation
function animate() {
  requestAnimationFrame(animate);
  Object.values(meshes).forEach(m => {
    m.rotation.y += m.userData.selfRotation || 0.005;
  });
  renderer.render(scene, camera);
}
animate();

// Drag to Rotate + Scroll Zoom
let isDragging = false, prevX = 0, prevY = 0;

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = (e.clientX - prevX) * 0.006;
  const dy = (e.clientY - prevY) * 0.006;
  camera.position.x += dx * 30;
  camera.position.z += dy * 25;
  camera.lookAt(0, 20, 0);
  prevX = e.clientX; prevY = e.clientY;
});

renderer.domElement.addEventListener('wheel', e => {
  camera.position.multiplyScalar(e.deltaY > 0 ? 1.12 : 0.89);
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Populate Planet List
const list = document.getElementById('planet-list');
BODIES.forEach(body => {
  if (body.id === 'sun') return;
  const btn = document.createElement('div');
  btn.className = 'planet-btn';
  btn.textContent = body.name;
  btn.onclick = () => showInfoPanel(body);
  list.appendChild(btn);
});

// Remove Loading Screen
setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
}, 1500);
</script>
</body>
</html>
