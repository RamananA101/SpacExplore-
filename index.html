<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpacExplore — Navigate the Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --hud: rgba(0,200,255,0.85);
      --hud-dim: rgba(0,200,255,0.35);
      --hud-bg: rgba(0,8,25,0.92);
      --accent: #00c8ff;
      --warn: #ff6b35;
      --gold: #ffd700;
    }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Exo 2',sans-serif; color:#fff; cursor:crosshair; }
    canvas { display:block; }

    /* LOADING */
    #loading {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200;
      transition: opacity 1s ease;
    }
    .loading-logo { font-family:'Orbitron',monospace; font-size:2.8rem; font-weight:900; color:var(--accent); text-shadow:0 0 40px rgba(0,200,255,0.7); letter-spacing:0.2em; margin-bottom:0.4rem; }
    .loading-sub { font-size:0.75rem; color:var(--hud-dim); letter-spacing:0.25em; text-transform:uppercase; margin-bottom:3rem; }
    .load-bar-wrap { width:300px; height:2px; background:rgba(0,200,255,0.12); border-radius:2px; overflow:hidden; }
    .load-bar { height:100%; width:0%; background:var(--accent); box-shadow:0 0 12px var(--accent); transition:width 0.05s linear; }
    .load-msg { font-family:'Orbitron',monospace; font-size:0.58rem; color:var(--hud-dim); letter-spacing:0.15em; margin-top:1rem; }

    /* HUD HEADER */
    #hud-top {
      position:fixed; top:0; left:0; right:0; padding:1rem 2rem;
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(to bottom,rgba(0,4,18,0.95) 0%,transparent 100%);
      z-index:10; pointer-events:none;
    }
    .logo { font-family:'Orbitron',monospace; font-size:1.35rem; font-weight:900; color:var(--accent); text-shadow:0 0 20px rgba(0,200,255,0.5); letter-spacing:0.12em; }
    .logo span { color:#fff; }
    .hud-right { text-align:right; font-family:'Orbitron',monospace; font-size:0.6rem; color:var(--hud-dim); letter-spacing:0.1em; line-height:1.8; }

    /* SIDEBAR BUTTONS */
    #sidebar {
      position:fixed; left:1rem; top:50%; transform:translateY(-50%);
      z-index:10; display:flex; flex-direction:column; gap:0.35rem; max-height:90vh; overflow-y:auto;
    }
    #sidebar::-webkit-scrollbar { width:3px; }
    #sidebar::-webkit-scrollbar-thumb { background:rgba(0,200,255,0.3); }
    .section-label {
      font-family:'Orbitron',monospace; font-size:0.48rem; letter-spacing:0.2em;
      text-transform:uppercase; color:rgba(0,200,255,0.25); padding:0.4rem 0.5rem 0.1rem;
    }
    .obj-btn {
      background:rgba(0,8,25,0.75); border:1px solid rgba(0,200,255,0.15);
      color:rgba(255,255,255,0.5); font-family:'Orbitron',monospace; font-size:0.55rem;
      letter-spacing:0.08em; text-transform:uppercase; padding:0.45rem 0.75rem;
      cursor:pointer; transition:all 0.2s; text-align:left; white-space:nowrap; width:100%;
    }
    .obj-btn:hover, .obj-btn.active {
      border-color:var(--accent); color:var(--accent);
      background:rgba(0,200,255,0.08); text-shadow:0 0 8px rgba(0,200,255,0.5);
    }

    /* INFO PANEL */
    #info-panel {
      position:fixed; right:1.5rem; top:50%; transform:translateY(-50%);
      width:310px; background:var(--hud-bg);
      border:1px solid rgba(0,200,255,0.25); border-left:3px solid var(--accent);
      padding:1.8rem; z-index:20; display:none;
      animation:slideIn 0.3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-50%) translateX(16px)} to{opacity:1;transform:translateY(-50%) translateX(0)} }
    #info-panel.show { display:block; }
    .p-close {
      position:absolute; top:0.7rem; right:0.7rem;
      background:none; border:1px solid rgba(0,200,255,0.25); color:var(--hud-dim);
      width:22px; height:22px; border-radius:50%; cursor:pointer; font-size:0.7rem;
      display:flex; align-items:center; justify-content:center; transition:all 0.2s;
    }
    .p-close:hover { border-color:var(--warn); color:var(--warn); }
    .p-category { font-family:'Orbitron',monospace; font-size:0.52rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--hud-dim); margin-bottom:0.3rem; }
    .p-name { font-family:'Orbitron',monospace; font-size:1.5rem; font-weight:700; color:var(--accent); text-shadow:0 0 12px rgba(0,200,255,0.4); margin-bottom:1rem; line-height:1.1; }
    .p-img { width:100%; height:130px; object-fit:cover; border:1px solid rgba(0,200,255,0.2); margin-bottom:1rem; border-radius:2px; display:none; }
    .p-desc { font-size:0.82rem; line-height:1.8; color:rgba(255,255,255,0.72); font-weight:300; margin-bottom:1rem; }
    .p-divider { height:1px; background:rgba(0,200,255,0.15); margin:0.8rem 0; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; }
    .stat { background:rgba(0,200,255,0.05); border:1px solid rgba(0,200,255,0.12); padding:0.55rem 0.7rem; border-radius:3px; }
    .stat-l { font-family:'Orbitron',monospace; font-size:0.45rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--hud-dim); margin-bottom:0.15rem; }
    .stat-v { font-size:0.8rem; font-weight:500; color:#fff; }

    /* CONTROLS */
    #hint {
      position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%);
      display:flex; gap:1.5rem; background:rgba(0,8,25,0.75);
      border:1px solid rgba(0,200,255,0.15); padding:0.5rem 1.2rem; border-radius:2rem;
      z-index:10; pointer-events:none;
    }
    .hint { font-size:0.65rem; color:var(--hud-dim); letter-spacing:0.08em; text-transform:uppercase; }
    .hint b { color:var(--accent); font-weight:500; }

    /* MODE TOGGLE */
    #mode-toggle {
      position:fixed; top:5rem; right:1.5rem; z-index:15;
      display:flex; flex-direction:column; gap:0.4rem;
    }
    .mode-btn {
      background:rgba(0,8,25,0.85); border:1px solid rgba(0,200,255,0.2);
      color:rgba(255,255,255,0.5); font-family:'Orbitron',monospace; font-size:0.52rem;
      letter-spacing:0.1em; text-transform:uppercase; padding:0.5rem 0.9rem;
      cursor:pointer; transition:all 0.2s;
    }
    .mode-btn:hover, .mode-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,200,255,0.08); }

    @media(max-width:600px){
      #sidebar{display:none;}
      #info-panel{right:0.5rem;left:0.5rem;width:auto;top:auto;bottom:4.5rem;transform:none;}
      #mode-toggle{top:4rem;right:0.5rem;}
    }
  </style>
</head>

// ── Procedural Planet Texture ──
function makePlanetTexture(hue, sat, lit, type='normal') {
  const size = 512;
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  const bg = `hsl(${hue*360},${sat*100}%,${lit*100}%)`;
  ctx.fillStyle = bg; ctx.fillRect(0,0,size,size);

  if (type === 'bands') {
    // Jupiter bands
    const colors = ['hsl(30,60%,55%)','hsl(25,50%,48%)','hsl(35,65%,60%)','hsl(20,55%,44%)','hsl(30,55%,52%)'];
    let y=0;
    for(let i=0;i<18;i++){
      const h = size/18 + (Math.random()-0.5)*8;
      ctx.fillStyle = colors[i%colors.length];
      ctx.fillRect(0,y,size,h); y+=h;
    }
    // Great Red Spot
    const gx=size*0.35, gy=size*0.58, gw=size*0.12, gh=size*0.07;
    const gr = ctx.createRadialGradient(gx,gy,2,gx,gy,gw);
    gr.addColorStop(0,'rgba(180,50,20,0.9)');
    gr.addColorStop(0.5,'rgba(160,40,15,0.6)');
    gr.addColorStop(1,'rgba(120,30,10,0)');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.ellipse(gx,gy,gw,gh,0,0,Math.PI*2); ctx.fill();
  } else if (type === 'sun') {
    // Sun texture with granules
    for(let i=0;i<3000;i++){
      const x=Math.random()*size, y=Math.random()*size;
      const r=Math.random()*6+2;
      const l = 0.75 + Math.random()*0.2;
      const g = ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,`hsla(40,100%,${l*100}%,0.6)`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
  } else if (type === 'earth') {
    // Continents
    ctx.fillStyle='hsl(210,75%,40%)'; ctx.fillRect(0,0,size,size);
    const landColor = ['hsl(115,45%,30%)','hsl(100,40%,35%)','hsl(90,35%,40%)'];
    for(let i=0;i<12;i++){
      const x=Math.random()*size, y=Math.random()*size;
      const rx=40+Math.random()*80, ry=30+Math.random()*60;
      ctx.fillStyle=landColor[i%3];
      ctx.beginPath(); ctx.ellipse(x,y,rx,ry,Math.random()*Math.PI,0,Math.PI*2); ctx.fill();
    }
    // Ice caps
    const iceG = ctx.createLinearGradient(0,0,0,size);
    iceG.addColorStop(0,'rgba(230,240,255,0.9)'); iceG.addColorStop(0.1,'rgba(200,220,255,0.3)'); iceG.addColorStop(0.9,'rgba(200,220,255,0.3)'); iceG.addColorStop(1,'rgba(230,240,255,0.9)');
    ctx.fillStyle=iceG; ctx.fillRect(0,0,size,size);
    // Clouds
    for(let i=0;i<200;i++){
      const x=Math.random()*size, y=Math.random()*size, r=5+Math.random()*20;
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(x,y,r,r*0.4,Math.random()*Math.PI,0,Math.PI*2); ctx.fill();
    }
  } else if (type === 'mars') {
    // Mars surface
    ctx.fillStyle='hsl(16,70%,38%)'; ctx.fillRect(0,0,size,size);
    for(let i=0;i<500;i++){
      const x=Math.random()*size, y=Math.random()*size, r=Math.random()*18+2;
      const l = 0.25+Math.random()*0.15;
      ctx.fillStyle=`hsla(15,65%,${l*100}%,0.5)`;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    // Polar ice
    const polG=ctx.createLinearGradient(0,0,0,size);
    polG.addColorStop(0,'rgba(220,210,200,0.8)'); polG.addColorStop(0.06,'rgba(220,210,200,0)'); polG.addColorStop(0.94,'rgba(220,210,200,0)'); polG.addColorStop(1,'rgba(220,210,200,0.7)');
    ctx.fillStyle=polG; ctx.fillRect(0,0,size,size);
  } else if (type === 'moon') {
    ctx.fillStyle='hsl(0,0%,50%)'; ctx.fillRect(0,0,size,size);
    for(let i=0;i<300;i++){
      const x=Math.random()*size, y=Math.random()*size, r=2+Math.random()*20;
      const d=Math.random()>0.5?-1:1;
      ctx.fillStyle=`rgba(${d>0?'255,255,255':'0,0,0'},${0.05+Math.random()*0.15})`;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
  } else if (type === 'gas') {
    // Generic gas planet with swirls
    for(let i=0;i<1200;i++){
      const x=Math.random()*size, y=Math.random()*size, r=1+Math.random()*4;
      ctx.fillStyle=`hsla(${hue*360+Math.random()*30-15},${sat*80}%,${lit*100+Math.random()*15-7}%,0.15)`;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
  } else {
    // Default rocky
    for(let i=0;i<800;i++){
      const x=Math.random()*size, y=Math.random()*size, r=1+Math.random()*8;
      ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.15})`;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
  }
  return new THREE.CanvasTexture(c);
}

function makeSunTexture(){ return makePlanetTexture(0.11,1,0.8,'sun'); }
function makeGalaxyTexture(colors){
  const size=512; const c=document.createElement('canvas'); c.width=c.height=size;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,size,size);
  // Spiral arms
  for(let arm=0;arm<4;arm++){
    const startAngle = (arm/4)*Math.PI*2;
    for(let i=0;i<4000;i++){
      const t=i/4000;
      const angle=startAngle+t*Math.PI*5;
      const r=t*220+5+(Math.random()-0.5)*30;
      const x=size/2+Math.cos(angle)*r, y=size/2+Math.sin(angle)*r*0.5;
      const col=colors[Math.floor(Math.random()*colors.length)];
      ctx.fillStyle=`rgba(${col},${0.3+Math.random()*0.5})`;
      const sz=0.5+Math.random()*2.5;
      ctx.fillRect(x,y,sz,sz);
    }
  }
  // Core
  const cg=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,80);
  cg.addColorStop(0,'rgba(255,240,210,0.95)');
  cg.addColorStop(0.3,'rgba(255,200,150,0.6)');
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}
function makeNebulaTexture(r,g,b){
  const size=512; const c=document.createElement('canvas'); c.width=c.height=size;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,size,size);
  for(let i=0;i<80;i++){
    const x=100+Math.random()*312, y=100+Math.random()*312;
    const rad=30+Math.random()*80;
    const a=Math.random()*0.25+0.1;
    const ng=ctx.createRadialGradient(x,y,0,x,y,rad);
    ng.addColorStop(0,`rgba(${r},${g},${b},${a})`);
    ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng; ctx.fillRect(0,0,size,size);
  }
  for(let i=0;i<1500;i++){
    const x=Math.random()*size, y=Math.random()*size;
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.5})`;
    ctx.fillRect(x,y,0.8,0.8);
  }
  return new THREE.CanvasTexture(c);
}
function makeBlackHoleTexture(){
  const size=512; const c=document.createElement('canvas'); c.width=c.height=size;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,size,size);
  // Accretion disk glow
  const cg=ctx.createRadialGradient(size/2,size/2,10,size/2,size/2,200);
  cg.addColorStop(0,'rgba(0,0,0,1)');
  cg.addColorStop(0.2,'rgba(255,120,0,0.8)');
  cg.addColorStop(0.4,'rgba(255,200,50,0.5)');
  cg.addColorStop(0.6,'rgba(200,100,0,0.3)');
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}
function makePulsarTexture(){
  const size=256; const c=document.createElement('canvas'); c.width=c.height=size;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,size,size);
  const g=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,'rgba(180,220,255,1)');
  g.addColorStop(0.2,'rgba(100,160,255,0.8)');
  g.addColorStop(0.5,'rgba(50,100,200,0.4)');
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

function makeStarField(count, spread, size, opacity){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for(let i=0;i<count*3;i++) pos[i]=(Math.random()-0.5)*spread;
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0xffffff,size,transparent:true,opacity});
  return new THREE.Points(geo,mat);
}

// ── Milky Way band ──
function makeMilkyWay(){
  const geo=new THREE.BufferGeometry();
  const count=6000;
  const pos=new Float32Array(count*3);
  const colors=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const r=300+Math.random()*900;
    pos[i*3]=Math.cos(angle)*r;
    pos[i*3+1]=(Math.random()-0.5)*120*Math.exp(-r/600);
    pos[i*3+2]=Math.sin(angle)*r;
    const t=Math.random();
    colors[i*3]=0.7+t*0.3; colors[i*3+1]=0.7+t*0.25; colors[i*3+2]=0.8+t*0.2;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  const mat=new THREE.PointsMaterial({size:0.4,vertexColors:true,transparent:true,opacity:0.3});
  return new THREE.Points(geo,mat);
}

function getPlanetType(id){
  if(id==='sun') return 'sun';
  if(id==='earth') return 'earth';
  if(id==='mars') return 'mars';
  if(id==='moon') return 'moon';
  if(id==='jupiter') return 'bands';
  if(id==='mercury'||id==='venus') return 'rocky';
  if(id==='saturn'||id==='uranus'||id==='neptune') return 'gas';
  return 'normal';
}

SOLAR.forEach(b => {
  const type = getPlanetType(b.id);
  let tex;
  if(type==='sun') tex=makeSunTexture();
  else tex=makePlanetTexture(b.hue,b.sat,b.lit,type==='rocky'?'normal':type);

  const geo = new THREE.SphereGeometry(b.r, 64, 64);
  let mat;
  if(b.id==='sun'){
    mat=new THREE.MeshBasicMaterial({map:tex});
  } else {
    const emColor=new THREE.Color().setHSL(b.emH,b.emS,b.emL);
    mat=new THREE.MeshPhongMaterial({map:tex,emissive:emColor,emissiveIntensity:b.emI,shininess:b.id==='earth'?40:8});
  }

  const mesh=new THREE.Mesh(geo,mat);
  mesh.userData=b;
  orbitAngles[b.id]=Math.random()*Math.PI*2;

  if(b.id==='sun'){
    mesh.position.set(0,0,0);
    solarGroup.add(mesh);
    // glow
    const gGeo=new THREE.SphereGeometry(b.r*1.4,32,32);
    const gMat=new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.08,side:THREE.BackSide});
    solarGroup.add(new THREE.Mesh(gGeo,gMat));
    const gGeo2=new THREE.SphereGeometry(b.r*1.8,32,32);
    const gMat2=new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0.04,side:THREE.BackSide});
    solarGroup.add(new THREE.Mesh(gGeo2,gMat2));
  } else if(b.parent==='earth'){
    mesh.position.set(b.dist,0,0);
    earthGroup.add(mesh);
  } else {
    const a=orbitAngles[b.id];
    mesh.position.set(Math.cos(a)*b.dist,0,Math.sin(a)*b.dist);
    solarGroup.add(mesh);
    if(b.id==='earth') earthGroup.position.copy(mesh.position);
    // Orbit line
    const pts=[];
    for(let i=0;i<=128;i++) pts.push(new THREE.Vector3(Math.cos(i/128*Math.PI*2)*b.dist,0,Math.sin(i/128*Math.PI*2)*b.dist));
    const oGeo=new THREE.BufferGeometry().setFromPoints(pts);
    const oMat=new THREE.LineBasicMaterial({color:0x223344,transparent:true,opacity:0.35});
    solarGroup.add(new THREE.Line(oGeo,oMat));
  }

  // Rings
  if(b.ring){
    const rGeo=new THREE.RingGeometry(b.r*b.ringInner,b.r*b.ringOuter,128);
    // Colour ring geometry
    const rTex=makePlanetTexture(b.hue,0.5,0.7);
    const rMat=new THREE.MeshBasicMaterial({color:b.ringColor,transparent:true,opacity:b.ringOpacity,side:THREE.DoubleSide});
    const rMesh=new THREE.Mesh(rGeo,rMat);
    rMesh.rotation.x=b.id==='uranus'?0:Math.PI/3;
    if(b.id==='uranus') rMesh.rotation.z=Math.PI/2.2;
    mesh.add(rMesh);
  }

  // Glow
  if(b.glow){
    const gGeo=new THREE.SphereGeometry(b.r*b.glowSize,32,32);
    const gMat=new THREE.MeshBasicMaterial({color:b.glowColor,transparent:true,opacity:0.1,side:THREE.BackSide});
    mesh.add(new THREE.Mesh(gGeo,gMat));
  }

  // Jupiter bands overlay
  if(b.id==='jupiter'){
    const bTex=makePlanetTexture(0.08,0.55,0.52,'bands');
    mesh.material.map=bTex; mesh.material.needsUpdate=true;
  }

  meshMap[b.id]=mesh;
});

let isDrag=false, px=0, py=0;
let sph={theta:0.3,phi:1.1,r:100};

let fPos=new THREE.Vector3(0,0,0), tFPos=new THREE.Vector3(0,0,0);

function sphereToCart(s,f){
  return new THREE.Vector3(
    f.x+s.r*Math.sin(s.phi)*Math.cos(s.theta),
    f.y+s.r*Math.cos(s.phi),
    f.z+s.r*Math.sin(s.phi)*Math.sin(s.theta)
  );
}

renderer.domElement.addEventListener('mousedown',e=>{isDrag=true;px=e.clientX;py=e.clientY;lastClick={x:e.clientX,y:e.clientY};});
renderer.domElement.addEventListener('touchstart',e=>{isDrag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('touchend',()=>isDrag=false);

window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  tSph.theta-=(e.clientX-px)*0.007;
  tSph.phi=Math.max(0.08,Math.min(Math.PI-0.08,tSph.phi-(e.clientY-py)*0.007));
  px=e.clientX;py=e.clientY;
});
window.addEventListener('touchmove',e=>{
  if(!isDrag)return;
  tSph.theta-=(e.touches[0].clientX-px)*0.007;
  tSph.phi=Math.max(0.08,Math.min(Math.PI-0.08,tSph.phi-(e.touches[0].clientY-py)*0.007));
  px=e.touches[0].clientX;py=e.touches[0].clientY;
},{passive:true});

window.addEventListener('wheel',e=>{
  tSph.r=Math.max(4,Math.min(currentMode==='solar'?200:700,tSph.r+e.deltaY*0.06));
});

// Raycaster
const ray=new THREE.Raycaster();
const mouse2=new THREE.Vector2();

renderer.domElement.addEventListener('click',e=>{
  if(Math.hypot(e.clientX-lastClick.x,e.clientY-lastClick.y)>6)return;
  mouse2.x=(e.clientX/innerWidth)*2-1;
  mouse2.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse2,camera);
  const targets=currentMode==='solar'?Object.values(meshMap):Object.values(deepMeshes);
  const hits=ray.intersectObjects(targets);
  if(hits.length){
    const body=hits[0].object.userData;
    focusObject(body);
    showPanel(body);
  }
});

function focusObject(body){
  focusId=body.id;
  const mesh=meshMap[body.id]||deepMeshes[body.id];
  if(!mesh)return;
  const wp=mesh.getWorldPosition(new THREE.Vector3());
  tFPos.copy(wp);
  const r=body.r||10;
  tSph.r=Math.max(r*5+4, r*8);
  document.getElementById('focus-txt').textContent=body.name.toUpperCase();
  document.querySelectorAll('.obj-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('obtn-'+body.id);
  if(btn)btn.classList.add('active');
}

function resetFocus(){
  focusId=null;
  tFPos.set(0,0,0);
  tSph.r=currentMode==='solar'?100:400;
  document.getElementById('focus-txt').textContent='FREE ROAM';
  document.querySelectorAll('.obj-btn').forEach(b=>b.classList.remove('active'));
}

// ── Info Panel ──
function showPanel(body){
  document.getElementById('p-cat').textContent=body.cat||body.type||'';
  document.getElementById('p-nm').textContent=body.name;
  document.getElementById('p-dsc').textContent=body.desc;
  const sg=document.getElementById('p-stats'); sg.innerHTML='';
  if(body.stats) Object.entries(body.stats).forEach(([k,v])=>{
    sg.innerHTML+=`<div class="stat"><div class="stat-l">${k}</div><div class="stat-v">${v}</div></div>`;
  });
  document.getElementById('info-panel').classList.add('show');
}
function closePanel(){ document.getElementById('info-panel').classList.remove('show'); resetFocus(); }

// ── Mode toggle ──
function setMode(mode){
  currentMode=mode;
  solarGroup.visible=mode==='solar';
  deepGroup.visible=mode==='deep';
  closePanel();
  tFPos.set(0,0,0); fPos.set(0,0,0);
  tSph.r=mode==='solar'?100:400;
  sph.r=tSph.r;
  document.getElementById('focus-txt').textContent='FREE ROAM';
  document.getElementById('btn-solar').classList.toggle('active',mode==='solar');
  document.getElementById('btn-deep').classList.toggle('active',mode==='deep');
  buildSidebar();
}

// ── Sidebar ──
function buildSidebar(){
  const el=document.getElementById('sidebar'); el.innerHTML='';
  if(currentMode==='solar'){
    el.innerHTML+='<div class="section-label">Solar System</div>';
    SOLAR.forEach(b=>{
      const btn=document.createElement('button');
      btn.className='obj-btn'; btn.id='obtn-'+b.id; btn.textContent=b.name;
      btn.onclick=()=>{ focusObject(b); showPanel(b); };
      el.appendChild(btn);
    });
  } else {
    el.innerHTML+='<div class="section-label">Deep Space Objects</div>';
    DEEP_SPACE.forEach(d=>{
      const btn=document.createElement('button');
      btn.className='obj-btn'; btn.id='obtn-'+d.id; btn.textContent=d.name;
      btn.onclick=()=>{ focusObject(d); showPanel(d); };
      el.appendChild(btn);
    });
  }
}

// ANIMATE
// ════════════════════════════════════════
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  const t=clock.getElapsedTime();

  // Orbit planets
  SOLAR.forEach(b=>{
    if(!b.spd||b.parent)return;
    orbitAngles[b.id]=(orbitAngles[b.id]||0)+b.spd*dt;
    const m=meshMap[b.id];
    const x=Math.cos(orbitAngles[b.id])*b.dist;
    const z=Math.sin(orbitAngles[b.id])*b.dist;
    m.position.set(x,0,z);
    if(b.id==='earth') earthGroup.position.set(x,0,z);
  });

  // Moon
  orbitAngles['moon']=(orbitAngles['moon']||0)+0.08*dt;
  meshMap['moon'].position.set(Math.cos(orbitAngles['moon'])*3.2,0,Math.sin(orbitAngles['moon'])*3.2);

  // Self rotation
  SOLAR.forEach(b=>{ if(meshMap[b.id]) meshMap[b.id].rotation.y+=b.rot; });

  // Sun pulse
  if(meshMap['sun']) meshMap['sun'].material.color.setHSL(0.11,1,0.82+Math.sin(t*1.5)*0.06);

  // Deep space gentle rotation
  Object.values(deepMeshes).forEach(m=>{ m.rotation.y+=0.0002; });

  // Pulsar flash
  if(deepMeshes['neutron']) deepMeshes['neutron'].material.opacity=0.5+Math.abs(Math.sin(t*6.28*1.34))*0.5;

  // Track focused
  if(focusId){
    const m=meshMap[focusId]||deepMeshes[focusId];
    if(m) tFPos.copy(m.getWorldPosition(new THREE.Vector3()));
  }

  // Smooth camera
  sph.theta+=(tSph.theta-sph.theta)*0.07;
  sph.phi+=(tSph.phi-sph.phi)*0.07;
  sph.r+=(tSph.r-sph.r)*0.07;
  fPos.lerp(tFPos,0.07);
  camera.position.copy(sphereToCart(sph,fPos));
  camera.lookAt(fPos);

  renderer.render(scene,camera);
}

// Resize
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── Loading ──
const msgs=['Mapping stellar cartography…','Generating planet textures…','Placing celestial objects…','Rendering nebulae…','Calculating orbital mechanics…','Launching into the cosmos!'];
let prog=0;
const lbar=document.getElementById('lbar'), lmsg=document.getElementById('lmsg');
const li=setInterval(()=>{
  prog+=Math.random()*14+4;
  if(prog>=100){prog=100;clearInterval(li);}
  lbar.style.width=prog+'%';
  lmsg.textContent=msgs[Math.min(Math.floor(prog/18),msgs.length-1)];
  if(prog>=100){
    setTimeout(()=>{
      const ld=document.getElementById('loading');
      ld.style.opacity='0';
      setTimeout(()=>ld.style.display='none',900);
      animate();
    },500);
  }
},90);
</script>
